    font-family: monospace;
    font-size: 8pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── 2-up layout ── */
  .page-2up  { display: flex; gap: 0.175in; width: 100%; padding-right: 1pt; }
  .mini-page { flex: 1; min-width: 0; display: flex; gap: 0.125in; }

  /* ── Shared grid ── */
  .zone  { flex: 1; min-width: 0; }

  .col-p { width: 22%; }
  .col-plate { width: 14%; }
  .col-b1 { width: 8%; }
  .col-b2 { width: 8%; }
  .col-b3 { width: 8%; }
  .col-home { width: 12%; }

  th, td { border: 0.5pt solid #666; padding: 0; overflow: hidden; white-space: nowrap; }
  td div  { height: 24px; line-height: 24px; }
  th {
    height: 16px;
    line-height: 16px;
    text-align: center;
    font-size: 7pt;
    font-weight: bold;
    background: #ccc;
  }
  th.col-ab { text-align: left; padding-left: 3px; }
  th.col-p  { text-align: left; padding-left: 3px; }
  td.col-b1, td.col-b3 { background-color: #f0f0f0; }
  tr:nth-child(5n) td { background-color: #e8e8e8; }

  .page-break { page-break-after: always; }
</style>
</head>
