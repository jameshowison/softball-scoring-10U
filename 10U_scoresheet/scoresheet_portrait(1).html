<!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>10U Softball Scoresheet</title>
<style>
  @page { size: letter portrait; margin: 0.4in; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    font-size: 8pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── Top line: Away ... game details ... Home ── */
  .topline {
    display: flex;
    align-items: flex-end;
    margin-bottom: 8px;
    gap: 0.15in;
  }
  .topline .team {
    font-size: 9pt;
    font-weight: bold;
    white-space: nowrap;
  }
  .topline .game-details {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 0.2in;
    align-items: flex-end;
  }
  .header-field { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .header-field label { font-weight: bold; font-size: 7pt; color: #444; letter-spacing: 0.5px; }
  .header-field .underline { border-bottom: 0.75pt solid #333; height: 14px; }
  .header-field.fixed-sm .underline { width: 0.9in; }
  .header-field.fixed-md .underline { width: 1.4in; }

  .fillline {
    display: inline-block;
    border-bottom: 0.75pt solid #333;
    vertical-align: baseline;
    margin-left: 3px;
  }
  .fillline.short { width: 0.8in; }
  .fillline.long  { width: 1.4in; }

  /* ── Grids ── */
  .page { display: flex; gap: 0.25in; width: 100%; }
  .zone { flex: 1; min-width: 0; }


  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  th.col-ab, td.col-ab { width: 20mm; }
  th.col-p,  td.col-p  { width: 17mm; }
  th.col-b,  td.col-b  { width: 10mm; }
  th.col-plate, td.col-plate { width: 14mm; }
  th.col-home, td.col-home { width: 12mm; }

  th, td { border: 0.5pt solid #666; padding: 0; overflow: hidden; white-space: nowrap; }
  td div { height: 17px; line-height: 17px; }
  th { height: 16px; line-height: 16px; text-align: center; font-size: 7pt; font-weight: bold; background: #ccc; }
  th.col-ab { text-align: left; padding-left: 3px; font-size: 7pt; }
  th.col-p  { text-align: left; padding-left: 3px; }

  tr:nth-child(5n) td { background-color: #e8e8e8; }
  .page-break { page-break-after: always; }
</style>
</head>
